<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arab Bet Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .balance-card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #f1c40f;
            width: 80%;
        }
        .balance-amount {
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
        }
        .btn {
            background-color: #f1c40f;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>ARAB BET <span style="color:#f1c40f">PRO</span></h2>
    </div>

    <div class="balance-card">
        <div style="color: #aaa; margin-bottom: 10px;">الرصيد المتاح</div>
        <div class="balance-amount">5,000 د.ع</div>
    </div>

    <button class="btn" onclick="tg.close()">إغلاق التطبيق</button>

    <script>
        // تعريف التطبيق بشكل صحيح لمرة واحدة فقط
        const tg = window.Telegram.WebApp;

        // السطر السحري الذي يزيل الشاشة السوداء فوراً
        tg.ready(); 

        // تمديد التطبيق ليملأ الشاشة
        tg.expand();

        // ضبط ألوان الواجهة
        tg.headerColor = '#1e1e1e';
        tg.backgroundColor = '#121212';
    </script>
</body>
</html>
