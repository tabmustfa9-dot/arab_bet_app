<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00d2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0; padding: 20px;
        }
        .container {
            border: 2px solid #00d2ff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 15px #00d2ff;
        }
        .balance-box {
            font-size: 24px;
            margin-bottom: 30px;
            color: #fff;
        }
        .bet-button {
            background: transparent;
            border: 2px solid #00d2ff;
            color: #00d2ff;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .bet-button:hover {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 20px #00d2ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CHILL BETS 🎲</h1>
        <div class="balance-box">رصيدك: <span id="balance">1000</span> نقطة</div>
        <p>اختر رهانك القادم:</p>
        <button class="bet-button" onclick="placeBet()">راهن الآن</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function placeBet() {
            tg.showConfirm("هل تريد تأكيد الرهان بمبلغ 100 نقطة؟", (ok) => {
                if (ok) {
                    tg.sendData("bet_placed_100"); // يرسل إشارة للبوت البرمجي
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
