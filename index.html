<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sports Live Demo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:#0b1220;
color:white;
direction:rtl;
padding-bottom:80px;
}

header{
background:#0f2747;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.topmenu{
display:flex;
overflow:auto;
gap:10px;
padding:15px;
background:#132f56;
}

.tab{
background:#1d4d8f;
padding:10px 18px;
border-radius:12px;
white-space:nowrap;
}

.banner{
margin:15px;
background:#1f4fa3;
padding:20px;
border-radius:15px;
text-align:center;
font-size:22px;
}

.section-title{
padding:15px;
font-size:22px;
font-weight:bold;
}

#matches{
padding:15px;
}

.match{
background:#162235;
margin-bottom:15px;
border-radius:14px;
padding:18px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.league{
opacity:.8;
margin-bottom:12px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
font-size:20px;
}

.odds{
display:flex;
gap:10px;
}

.odd{
flex:1;
background:#1d4d8f;
padding:10px;
text-align:center;
border-radius:10px;
}

.live{
display:inline-block;
background:red;
padding:5px 12px;
border-radius:8px;
font-size:13px;
}

.bottomnav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#0f2747;
padding:15px;
}

</style>
</head>
<body>

<header>
SPORTS LIVE
</header>

<div class="topmenu">
<div class="tab">مباشر</div>
<div class="tab">كرة القدم</div>
<div class="tab">كرة السلة</div>
<div class="tab">الدوريات</div>
<div class="tab">المفضلة</div>
</div>

<div class="banner">
🔥 مباريات مباشرة اليوم
</div>

<div class="section-title">
المباريات الحية
</div>

<div id="matches">
جار التحميل...
</div>

<div class="bottomnav">
<div>الرئيسية</div>
<div>المباريات</div>
<div>الرهانات التجريبية</div>
<div>الحساب</div>
</div>

<script>

async function loadMatches(){

try{

let url=
"https://www.thesportsdb.com/api/v1/json/3/livescore.php?s=Soccer";

let response=await fetch(url);
let data=await response.json();

let box=
document.getElementById("matches");

box.innerHTML="";

if(!data.event || data.event.length===0){
box.innerHTML="<h3>لا توجد مباريات مباشرة الآن</h3>";
return;
}

data.event.forEach(m=>{

box.innerHTML += `
<div class='match'>

<div class='league'>
${m.strLeague}
</div>

<div class='row'>
<span>${m.strHomeTeam}</span>

<span>
${m.intHomeScore||0}
-
${m.intAwayScore||0}
</span>

<span>${m.strAwayTeam}</span>
</div>

<div class='live'>
LIVE
</div>

<br><br>

<div class='odds'>
<div class='odd'>1.85</div>
<div class='odd'>3.20</div>
<div class='odd'>2.40</div>
</div>

</div>
`;

});

}
catch(err){
document.getElementById("matches").innerHTML=
"تعذر تحميل المباريات";
}

}

loadMatches();
setInterval(loadMatches,30000);

</script>

</body>
</html>
