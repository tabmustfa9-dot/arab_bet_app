<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arab Bet Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #f1c40f; 
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(180deg, #1e1e1e 0%, #121212 100%);
            border-bottom: 2px solid var(--primary-color);
        }

        .balance-card {
            background-color: var(--card-bg);
            width: 90%;
            border-radius: 20px;
            margin-top: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        .balance-amount { font-size: 32px; font-weight: bold; color: var(--primary-color); }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 90%;
            background-color: var(--primary-color);
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>ARAB BET <span style="color:var(--primary-color)">PRO</span></h2>
    </div>

    <div class="balance-card">
        <div style="color: #aaa; margin-bottom: 10px;">الرصيد المتاح</div>
        <div class="balance-amount">5,000 د.ع</div>
    </div>

    <button class="btn" onclick="tg.close()">إغلاق التطبيق</button>

    <script>
        // تعريف التطبيق
        const tg = window.Telegram.WebApp;

        // السطر السحري الذي يحل مشكلة الشاشة السوداء
        tg.ready(); 

        // تمديد التطبيق ليملأ الشاشة
        tg.expand();

        // ضبط ألوان الواجهة البرمجية
        tg.headerColor = '#1e1e1e';
        tg.backgroundColor = '#121212';
    </script>
</body>
</html>
