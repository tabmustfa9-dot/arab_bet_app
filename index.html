<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arab Bet Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #f1c40f; --bg: #121212; --card: #1e1e1e; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 30px 0; text-align: center; width: 100%; background: linear-gradient(to bottom, #1e1e1e, #121212); border-bottom: 1px solid #333; }
        .balance-card { background-color: var(--card); width: 85%; border-radius: 20px; margin-top: 30px; padding: 25px; text-align: center; border: 1px solid #333; }
        .balance-label { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        .balance-amount { font-size: 30px; font-weight: bold; color: var(--primary); }
        .button-container { width: 90%; margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-secondary { background-color: #2c2c2c; color: white; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="header">
        <h2>ARAB BET <span style="color:var(--primary)">PRO</span></h2>
    </div>

    <div class="balance-card">
        <div class="balance-label">الرصيد المتاح حالياً</div>
        <div class="balance-amount">0.00 د.ع</div>
    </div>

    <div class="button-container">
        <button class="btn btn-primary" onclick="handleBtn('إيداع')">إيداع رصيد</button>
        <button class="btn btn-secondary" onclick="handleBtn('سحب')">سحب الأرباح</button>
        <button class="btn btn-secondary" onclick="handleBtn('دعم')">مركز الدعم الفني</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function handleBtn(type) {
            tg.HapticFeedback.impactOccurred('medium');
            if(type === 'إيداع') {
                tg.showAlert("بوابة الإيداع ستتوفر قريباً.");
            } else if(type === 'سحب') {
                tg.showAlert("رصيدك الحالي غير كافٍ للسحب.");
            } else {
                tg.showAlert("جاري تحويلك للدعم الفني...");
            }
        }
    </script>
</body>
</html>
