<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نموذج تطبيق مراهنات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- الشريط العلوي -->
    <header class="top-nav">
        <div class="logo">BET-LOGO</div>
        <div class="auth-buttons">
            <button class="login-btn">تسجيل دخول</button>
            <button class="register-btn">تسجيل</button>
        </div>
    </header>

    <div class="main-container">
        <!-- القائمة الجانبية -->
        <aside class="sidebar">
            <h3>الرياضات</h3>
            <ul>
                <li>⚽ كرة القدم</li>
                <li>🏀 كرة السلة</li>
                <li>🎾 التنس</li>
                <li>🎮 الرياضات الإلكترونية</li>
            </ul>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="content">
            <section class="live-matches">
                <h2>مباريات مباشرة 🔥</h2>
                <div class="match-card">
                    <div class="teams">الفريق أ vs الفريق ب</div>
                    <div class="odds">
                        <button>1: 2.50</button>
                        <button>X: 3.10</button>
                        <button>2: 1.95</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- قسيمة الرهان -->
        <aside class="bet-slip">
            <h3>قسيمة الرهان</h3>
            <div class="empty-msg">لم تضف أي رهانات بعد</div>
        </aside>
    </div>
</body>
</html>
