<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arab Bet Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* الهيدر العلوي */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #111; border-bottom: 1px solid #f1c40f; }
        .logo { font-weight: bold; color: #f1c40f; font-size: 18px; }
        .balance-top { background: #222; padding: 5px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #333; }

        /* شبكة الألعاب والخدمات */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .grid-item {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #222;
            transition: 0.2s;
        }

        .grid-item:active { transform: scale(0.95); background: #222; }

        .icon { font-size: 35px; margin-bottom: 10px; display: block; }
        .title { font-size: 14px; font-weight: bold; }

        /* شريط سفلي للملاحة */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { font-size: 12px; color: #888; text-align: center; }
        .nav-item.active { color: #f1c40f; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo">ARAB BET PRO</div>
        <div class="balance-top">💰 0.00 د.ع</div>
    </div>

    <div class="grid-container">
        <div class="grid-item" onclick="launch('game')">
            <span class="icon">🎮</span>
            <span class="title">قسم الألعاب</span>
        </div>
        
        <div class="grid-item" onclick="launch('deposit')">
            <span class="icon">💳</span>
            <span class="title">شحن رصيد</span>
        </div>

        <div class="grid-item" onclick="launch('tasks')">
            <span class="icon">🎁</span>
            <span class="title">جوائز يومية</span>
        </div>

        <div class="grid-item" onclick="launch('support')">
            <span class="icon">🎧</span>
            <span class="title">الدعم الفني</span>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active">🏠<br>الرئيسية</div>
        <div class="nav-item">🏆<br>المتصدرين</div>
        <div class="nav-item">👤<br>حسابي</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function launch(type) {
            tg.HapticFeedback.impactOccurred('medium');
            if(type === 'game') {
                tg.showAlert("جاري تحميل قائمة الألعاب...");
            } else if(type === 'deposit') {
                tg.showAlert("بوابة الشحن ستفتح قريباً.");
            } else {
                tg.showAlert("هذا القسم قيد التطوير.");
            }
        }
    </script>
</body>
</html>
