<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1xBet Clone - Real API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
        .wheel-container { position: relative; width: 250px; height: 250px; border-radius: 50%; border: 8px solid #3b82f6; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#1e293b 0deg 90deg, #3b82f6 90deg 180deg, #1e293b 180deg 270deg, #3b82f6 270deg 360deg); }
        .bet-button { background: linear-gradient(to right, #2563eb, #1d4ed8); transition: all 0.2s; }
        .bet-button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-md glass p-8 rounded-3xl text-center shadow-2xl">
            <h1 class="text-4xl font-black text-blue-500 mb-2 italic">1XBET</h1>
            <p class="text-gray-400 mb-8">أهلاً بك في النسخة المطورة</p>
            
            <input type="email" id="email" placeholder="البريد الإلكتروني" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-2xl mb-4 outline-none focus:border-blue-500 text-right">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-gray-800 border border-gray-700 p-4 rounded-2xl mb-6 outline-none focus:border-blue-500 text-right">
            
            <button onclick="handleLogin()" class="w-full bet-button text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-900/40">تسجيل الدخول</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="sticky top-0 z-50 glass p-4 flex justify-between items-center">
            <div class="text-xl font-bold text-blue-500 italic">1XBET</div>
            <div class="flex items-center gap-3">
                <div class="bg-gray-800 px-4 py-1.5 rounded-full border border-gray-700">
                    <span id="balance-display" class="font-mono text-yellow-400 font-bold text-lg">10,000</span>
                    <span class="text-[10px] text-gray-400 mr-1 font-bold">د.ع</span>
                </div>
                <button onclick="alert('الإيداع متاح عبر زين كاش (قريباً)')" class="bg-green-600 w-8 h-8 rounded-full font-bold flex items-center justify-center">+</button>
            </div>
        </header>

        <div id="wheel-section" class="p-6 text-center bg-blue-900/20 m-4 rounded-3xl border border-blue-500/30">
            <h3 class="text-yellow-400 font-bold mb-4">🎁 هدية اليوم: دور العجلة واربح!</h3>
            <div class="flex justify-center mb-6 relative">
                <div id="wheel" class="wheel-container flex items-center justify-center">
                    <div class="absolute inset-0 flex items-center justify-center text-[10px] font-bold">
                        <span class="absolute rotate-45 transform translate-y-[-80px]">خصم 50%</span>
                        <span class="absolute rotate-[135deg] transform translate-y-[-80px]">تعويض 50%</span>
                        <span class="absolute rotate-[225deg] transform translate-y-[-80px]">خصم 50%</span>
                        <span class="absolute rotate-[315deg] transform translate-y-[-80px]">تعويض 50%</span>
                    </div>
                </div>
                <div class="absolute top-[-10px] text-3xl">▼</div>
            </div>
            <button id="spin-btn" onclick="spinWheel()" class="bg-yellow-500 text-black font-black px-10 py-3 rounded-full shadow-xl">ابدأ الحظ</button>
        </div>

        <section class="p-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold border-r-4 border-blue-500 pr-2">مباشر الآن (API)</h2>
                <button onclick="fetchLiveMatches()" class="text-xs text-blue-400">تحديث ↻</button>
            </div>
            <div id="matches-container" class="space-y-3">
                <div class="text-center py-10 text-gray-500">جاري جلب البيانات...</div>
            </div>
        </section>

        <nav class="fixed bottom-0 left-0 right-0 glass flex justify-around p-3 border-t border-gray-800">
            <button class="flex flex-col items-center text-blue-500"><span class="text-xl">🏠</span><span class="text-[10px]">الرئيسية</span></button>
            <button class="flex flex-col items-center text-gray-400"><span class="text-xl">🚀</span><span class="text-[10px]">الألعاب</span></button>
            <button class="flex flex-col items-center text-gray-400"><span class="text-xl">👤</span><span class="text-[10px]">حسابي</span></button>
        </nav>
    </div>

    <script>
        // الـ API Key الذي زودتني به
        const API_KEY = "3ce976396ce8ae2bc6077d5b346f16a3";
        
        let balance = 10000;
        let hasDiscount = false;
        let hasCompensation = false;

        // 1. تسجيل الدخول
        function handleLogin() {
            const email = document.getElementById('email').value;
            if (email.includes('@')) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                fetchLiveMatches();
            } else {
                alert("يرجى إدخال بريد إلكتروني صحيح");
            }
        }

        // 2. جلب المباريات من الـ API
        async function fetchLiveMatches() {
            const container = document.getElementById('matches-container');
            try {
                const response = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
                    "method": "GET",
                    "headers": {
                        "x-rapidapi-host": "v3.football.api-sports.io",
                        "x-rapidapi-key": API_KEY
                    }
                });

                const data = await response.json();
                const matches = data.response;

                container.innerHTML = '';
                if (!matches || matches.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 p-4">لا توجد مباريات مباشرة حالياً.</div>';
                    return;
                }

                matches.slice(0, 10).forEach(m => {
                    container.innerHTML += `
                        <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-green-500">
                            <div class="w-1/3 text-center text-xs font-bold">${m.teams.home.name}</div>
                            <div class="w-1/3 text-center">
                                <span class="text-blue-400 text-[10px] block">${m.fixture.status.elapsed}'</span>
                                <span class="text-xl font-black">${m.goals.home} - ${m.goals.away}</span>
                            </div>
                            <div class="w-1/3 text-center text-xs font-bold">${m.teams.away.name}</div>
                            <button onclick="bet(1000)" class="bg-blue-600 text-[10px] px-3 py-2 rounded-lg font-bold ml-2">رهان</button>
                        </div>
                    `;
                });
            } catch (error) {
                container.innerHTML = '<div class="text-red-500 text-center">خطأ في الاتصال بالسيرفر.</div>';
            }
        }

        // 3. عجلة الحظ
        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spin-btn');
            let randomDeg = Math.floor(3000 + Math.random() * 3000);
            wheel.style.transform = `rotate(${randomDeg}deg)`;
            btn.disabled = true;
            btn.innerText = "جاري السحب...";

            setTimeout(() => {
                const results = ['خصم 50%', 'تعويض 50%'];
                const win = results[Math.floor(Math.random() * results.length)];
                
                if(win === 'خصم 50%') hasDiscount = true;
                else hasCompensation = true;

                alert("مبروك! لقد ربحت: " + win + "\nسيتم تطبيقها على رهانك القادم تلقائياً.");
                document.getElementById('wheel-section').innerHTML = `<p class="text-green-400 font-bold italic">تم تفعيل الجائزة: ${win} ✅</p>`;
            }, 4000);
        }

        // 4. منطق الرهان الحقيقي
        function bet(amount) {
            let finalAmount = hasDiscount ? amount * 0.5 : amount;
            
            if (balance < finalAmount) return alert("رصيدك لا يكفي!");

            balance -= finalAmount;
            if(hasDiscount) hasDiscount = false; // تستهلك مرة واحدة

            updateUI();
            
            // محاكاة فوز/خسارة
            setTimeout(() => {
                let won = Math.random() > 0.5;
                if(won) {
                    let profit = amount * 1.9;
                    balance += profit;
                    alert("🎉 مبروك! فاز رهانك وربحت " + profit + " د.ع");
                } else {
                    if(hasCompensation) {
                        balance += (finalAmount * 0.5);
                        hasCompensation = false;
                        alert("خسرت الرهان، لكن تم تعويضك بـ 50% من المبلغ!");
                    } else {
                        alert("للأسف، خسرت الرهان. حاول مرة أخرى!");
                    }
                }
                updateUI();
            }, 1000);
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = Math.floor(balance).toLocaleString();
        }
    </script>
</body>
</html>
